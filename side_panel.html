<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>DataCrawler</title>
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0;
      height: 100vh;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      background: #fff;
      display: flex;
      flex-direction: column;
    }
    .title-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 16px;
      border-bottom: 1px solid #eee;
      flex-shrink: 0;
    }
    .title-left {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .title-icon {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #e74c3c;
    }
    .title-text {
      font-size: 15px;
      font-weight: 600;
      color: #333;
    }
    .title-actions {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .btn-icon {
      width: 20px;
      height: 20px;
      border: none;
      background: transparent;
      cursor: pointer;
      padding: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #666;
      border-radius: 4px;
    }
    .btn-icon:hover {
      background: #f0f0f0;
      color: #333;
    }
    .btn-close:hover { color: #e74c3c; }
    .content {
      flex: 1;
      padding: 16px;
      overflow: auto;
    }
    .btn-primary {
      display: block;
      width: 100%;
      padding: 10px 16px;
      margin-bottom: 12px;
      font-size: 14px;
      color: #fff;
      background: #e74c3c;
      border: none;
      border-radius: 8px;
      cursor: pointer;
    }
    .btn-primary:hover { background: #c0392b; }
    .btn-secondary {
      display: block;
      width: 100%;
      padding: 8px 12px;
      margin-bottom: 10px;
      font-size: 13px;
      color: #666;
      background: #f0f0f0;
      border: 1px solid #ddd;
      border-radius: 6px;
      cursor: pointer;
    }
    .btn-secondary:hover { background: #e5e5e5; color: #333; }
    .url-display {
      margin-top: 8px;
      padding: 10px;
      font-size: 12px;
      color: #333;
      background: #f5f5f5;
      border-radius: 6px;
      word-break: break-all;
    }
    .page-type-hint {
      margin-top: 12px;
      padding: 8px 12px;
      font-size: 13px;
      color: #666;
      background: #f0f7ff;
      border-radius: 6px;
      border-left: 3px solid #e74c3c;
    }
    .search-result-section { margin-top: 16px; }
    .search-result-section label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      margin-bottom: 6px;
      color: #333;
    }
    .keyword-config {
      margin-bottom: 10px;
    }
    .keyword-config label {
      font-size: 12px;
      font-weight: 500;
      color: #666;
      margin-bottom: 4px;
    }
    .keyword-config input {
      padding: 8px 10px;
      font-size: 13px;
      border: 1px solid #ddd;
      border-radius: 6px;
      box-sizing: border-box;
    }
    .keyword-config input:focus {
      outline: none;
      border-color: #e74c3c;
    }
    .keyword-list {
      list-style: none;
      margin: 0 0 8px 0;
      padding: 0;
      max-height: 140px;
      overflow-y: auto;
      border: 1px solid #eee;
      border-radius: 6px;
      background: #fafafa;
    }
    .keyword-list li {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 6px 10px;
      border-bottom: 1px solid #eee;
      font-size: 13px;
    }
    .keyword-list li:last-child { border-bottom: none; }
    .keyword-list .keyword-text { flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .keyword-list .btn-remove {
      flex-shrink: 0;
      padding: 2px 8px;
      font-size: 12px;
      color: #999;
      background: transparent;
      border: 1px solid #ddd;
      border-radius: 4px;
      cursor: pointer;
    }
    .keyword-list .btn-remove:hover { color: #e74c3c; border-color: #e74c3c; }
    .keyword-add-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 8px;
    }
    .keyword-add-row input { flex: 1; min-width: 0; }
    .keyword-add-row .btn-secondary {
      margin-bottom: 0;
      width: auto;
      flex-shrink: 0;
      min-height: 38px;
      box-sizing: border-box;
    }
    .keyword-add-row .btn-add {
      flex-shrink: 0;
      padding: 8px 12px;
      font-size: 13px;
      color: #fff;
      background: #e74c3c;
      border: none;
      border-radius: 6px;
      cursor: pointer;
    }
    .keyword-add-row .btn-add:hover { background: #c0392b; }
    .keyword-execute-row { margin-bottom: 10px; }
    .auto-task-block { margin-top: 16px; padding-top: 12px; border-top: 1px solid #eee; }
    .interval-row {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-bottom: 10px;
      font-size: 13px;
      color: #666;
    }
    .interval-row input[type="number"] {
      width: 56px;
      padding: 6px 8px;
      font-size: 13px;
      border: 1px solid #ddd;
      border-radius: 6px;
    }
    .interval-row select {
      min-width: 88px;
      padding: 6px 8px;
      font-size: 13px;
      border: 1px solid #ddd;
      border-radius: 6px;
      background: #fff;
    }
    .interval-row label.checkbox-label {
      display: flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
      user-select: none;
    }
    .auto-task-buttons { display: flex; gap: 8px; }
    .auto-task-buttons .btn-primary,
    .auto-task-buttons .btn-secondary { flex: 1; margin-bottom: 0; }
    .keyword-execute-status {
      margin-top: 6px;
      font-size: 12px;
    }
    .countdown-above-log {
      margin-top: 6px;
      font-size: 12px;
      color: #1565c0;
      min-height: 1.2em;
    }
    .countdown-above-log .countdown-label { color: #666; margin-right: 4px; }
    .callback-log-wrap {
      margin-top: 8px;
    }
    .callback-log-wrap label { font-size: 12px; color: #666; display: block; margin-bottom: 4px; }
    .callback-log {
      max-height: 120px;
      overflow-y: auto;
      font-size: 11px;
      line-height: 1.4;
      color: #555;
      background: #f8f8f8;
      border: 1px solid #eee;
      border-radius: 4px;
      padding: 6px 8px;
      white-space: pre-wrap;
      word-break: break-all;
      min-height: 18px;
    }
    .callback-log .log-ok { color: #2e7d32; }
    .callback-log .log-err { color: #c62828; }
    .callback-log .log-info { color: #1565c0; }
    .operation-log-label { font-size: 12px; color: #666; display: block; margin-top: 8px; margin-bottom: 4px; }
    .search-result-text {
      width: 100%;
      min-height: 120px;
      padding: 10px;
      font-size: 12px;
      font-family: monospace;
      border: 1px solid #ddd;
      border-radius: 6px;
      resize: vertical;
      background: #fafafa;
    }
    .search-table-wrap {
      margin-top: 12px;
      overflow: auto;
      border: 1px solid #ddd;
      border-radius: 6px;
    }
    .search-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 12px;
    }
    .search-table th,
    .search-table td {
      padding: 6px 8px;
      border-bottom: 1px solid #eee;
      text-align: left;
    }
    .search-table th {
      background: #f5f5f5;
      font-weight: 600;
      position: sticky;
      top: 0;
    }
    .search-table tr:hover { background: #fafafa; }
    .search-table .col-title { max-width: 140px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .search-table .col-author { max-width: 80px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .search-table a { color: #e74c3c; text-decoration: none; }
    .search-table a:hover { text-decoration: underline; }
    .creator-section { margin-top: 20px; }
    .search-table .col-desc { max-width: 160px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .search-table .col-title { max-width: 180px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .search-table .col-avatar { width: 40px; padding: 4px; vertical-align: middle; }
    .creator-avatar { width: 32px; height: 32px; border-radius: 50%; object-fit: cover; display: block; }
    .creator-jump-btn { text-align: center; text-decoration: none; margin-bottom: 10px; }
    .creator-jump-btn[href="#"] { display: none !important; }
    .account-action-row {
      display: flex;
      gap: 8px;
      margin-bottom: 8px;
    }
    .account-list { margin-bottom: 8px; max-height: 280px; overflow-y: auto; border: 1px solid #eee; border-radius: 6px; background: #fafafa; }
    .account-list-row {
      display: flex; align-items: flex-start; gap: 8px; padding: 6px 10px; border-bottom: 1px solid #eee; font-size: 13px;
    }
    .account-list-row:last-child { border-bottom: none; }
    .account-list-row input[type="radio"] { flex-shrink: 0; margin-top: 2px; }
    .account-list-row .account-row-label { flex: 1; min-width: 0; display: flex; flex-direction: column; gap: 2px; cursor: pointer; word-break: break-all; }
    .account-list-row .account-row-phone { font-weight: 500; }
    .account-list-row .account-row-codeurl { font-size: 11px; color: #666; white-space: pre-wrap; word-break: break-all; }
    .account-list-row .btn-account-test { flex-shrink: 0; padding: 2px 8px; margin-bottom: 0; width: auto; min-height: 28px; margin-top: 0; }
    .account-list-row .btn-remove { flex-shrink: 0; padding: 2px 8px; font-size: 12px; margin-bottom: 0; margin-top: 0; }
    .account-add-row { margin-top: 4px; }
    .account-add-row input { flex: 1; min-width: 0; }
    .account-action-row .btn-primary,
    .account-action-row .btn-secondary {
      flex: 1;
      margin-bottom: 0;
    }
    .account-status {
      min-height: 1.4em;
      font-size: 12px;
      color: #666;
      padding: 4px 0 2px;
    }
    .account-status.ok { color: #2e7d32; }
    .account-status.err { color: #c62828; }
    .account-status.ing { color: #1565c0; }
    .account-row-stats { font-size: 11px; color: #1565c0; }
    .account-row-stats.exceeded { color: #c62828; font-weight: 500; }
    .account-max-collect {
      flex-shrink: 0;
      width: 60px;
      padding: 2px 4px;
      font-size: 12px;
      border: 1px solid #ddd;
      border-radius: 4px;
      text-align: center;
      margin-top: 0;
    }
    .account-max-collect:focus { outline: none; border-color: #e74c3c; }
  </style>
</head>

  <main class="content">
    <div class="keyword-config api-config">
      <label>接口根地址</label>
      <div class="keyword-add-row">
        <input type="text" id="apiHostInput" placeholder="https://your-api.example/" />
        <button type="button" class="btn-secondary" id="btnSaveApiHost">保存</button>
      </div>
      <label>登录账号（自动登录时使用下方选中的账号）</label>
      <div id="accountListContainer" class="account-list"></div>
      <div class="keyword-add-row account-add-row">
        <input type="text" id="accountNewPhone" placeholder="手机号" />
        <input type="text" id="accountNewCodeUrl" placeholder="接码链接" />
        <button type="button" class="btn-add" id="btnAddAccount">添加账号</button>
      </div>
      <div id="smsCodeResult" style="display:none;margin-top:4px;padding:6px 10px;font-size:13px;background:#f0f7ff;border-radius:6px;border-left:3px solid #e74c3c;word-break:break-all;white-space:pre-wrap;color:#333;"></div>
    </div>
    <div class="keyword-config">
      <label>账号管理</label>
      <div class="account-action-row">
        <button type="button" class="btn-secondary" id="btnAutoLogout">自动退出</button>
        <button type="button" class="btn-primary" id="btnAutoLogin">自动登录</button>
      </div>
      <div class="account-status" id="accountStatus"></div>
    </div>
    <button type="button" class="btn-primary" id="btnGetUrl">获取当前页面 URL</button>
    <div class="url-display" id="urlDisplay" style="display: none;"></div>
    <div class="page-type-hint" id="pageTypeHint"></div>
    <div class="search-result-section" id="searchResultSection">
      <label>搜索笔记（search_result 页）</label>
      <div class="keyword-config">
        <label>插件搜索关键词（可多个，按顺序执行）</label>
        <ul class="keyword-list" id="keywordList"></ul>
        <div class="interval-row">
          <span>发布时间筛选：</span>
          <select id="publishTimeFilter">
            <option value="">不筛选</option>
            <option value="一天内">一天内</option>
            <option value="一周内">一周内</option>
            <option value="半年内" selected>半年内</option>
            <option value="一年内">一年内</option>
          </select>
        </div>
        <div class="keyword-add-row">
          <input type="text" id="keywordNewInput" placeholder="输入关键词后点击添加" />
          <button type="button" class="btn-add" id="btnAddKeyword">添加</button>
        </div>
        <div class="keyword-execute-row">
          <button type="button" class="btn-primary" id="btnExecuteSearch">按顺序执行搜索</button>
          <div class="keyword-execute-status" id="keywordExecuteStatus"></div>
        </div>
      </div>
      <div class="auto-task-block keyword-config">
        <label>接口任务自动执行（从接口拉取关键词并自动搜索）</label>
        <div class="interval-row">
          <span>请求间隔（秒）：</span>
          <input type="number" id="autoTaskIntervalMin" min="1" max="120" value="5" title="最小间隔" />
          <span>～</span>
          <input type="number" id="autoTaskIntervalMax" min="1" max="120" value="20" title="最大间隔" />
        </div>
        <div class="interval-row">
          <label class="checkbox-label">
            <input type="checkbox" id="autoTaskRunInBackground" />
            后台执行（关闭侧边栏后继续运行）
          </label>
        </div>
        <div class="keyword-execute-row auto-task-buttons">
          <button type="button" class="btn-primary btn-auto-start" id="btnAutoTaskStart">启动自动任务</button>
          <button type="button" class="btn-secondary btn-auto-stop" id="btnAutoTaskStop" disabled>关闭自动任务</button>
        </div>
        <div class="keyword-execute-status" id="autoTaskStatus"></div>
        <div class="countdown-above-log" id="autoTaskCountdownWrap">
          <span class="countdown-label">请求关键词倒计时：</span>
          <span id="autoTaskCountdownText"></span>
        </div>
        <div class="callback-log-wrap">
          <label>回传日志</label>
          <div class="callback-log" id="autoTaskCallbackLog"></div>
        </div>
      </div>
      <button type="button" class="btn-secondary" id="btnClearTable">清空表格数据</button>
      <div class="search-table-wrap" id="searchResultTableWrap" style="display: none;"></div>
      <label class="operation-log-label">操作日志</label>
      <textarea class="search-result-text" id="searchResultText" readonly placeholder="搜索接口返回的 JSON、操作记录等"></textarea>
    </div>
    <div class="search-result-section creator-section" id="creatorSection">
      <label>达人列表（user/profile 页）</label>
      <a id="creatorJumpLink" href="#" target="_blank" rel="noopener" class="btn-primary creator-jump-btn" style="display: none;">达人跳转</a>
      <button type="button" class="btn-secondary" id="btnClearCreator">清空达人数据</button>
      <div class="search-table-wrap" id="creatorTableWrap" style="display: none;"></div>
      <textarea class="search-result-text" id="creatorListText" readonly placeholder="在达人主页或搜索用户时，此处会显示达人相关接口返回的 JSON"></textarea>
    </div>
  </main>
  <script src="js/panel/index.js"></script>
</body>
</html>
